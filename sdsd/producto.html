<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Producto</title>

    <link rel="stylesheet" href="css/styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="header-container">

            <a href="index.html" class="logo">
                <span class="logo-icon">SV</span>
                <span class="logo-text">SneakVault</span>
            </a>

            <nav class="nav">
                <a href="index.html" class="nav-link">Inicio</a>
            </nav>

            <div class="header-actions">

                <button class="icon-btn" id="wishlist-btn" onclick="openWishlist()">
                    ❤
                    <span class="badge" id="wishlist-count">0</span>
                </button>

                <button class="icon-btn" id="cart-btn" onclick="openCart()">
                    🛒
                    <span class="badge" id="cart-count">0</span>
                </button>

            </div>

        </div>
    </header>

    <!-- Detalle producto -->
   <main class="product-detail">

    <div class="product-gallery">

        <div class="main-image">
            <img id="main-product-image" src="" alt="">
        </div>

    </div>

    <div class="product-info">

        <p class="product-category" id="product-category"></p>

        <h1 class="product-title" id="product-title"></h1>

        <p class="product-price" id="product-price"></p>

        <p id="product-stock"></p>

        <p class="product-description" id="product-description"></p>

        <div class="product-options">

            <div class="option-group">
                <label>Talla</label>
                <div class="size-options" id="size-options"></div>
            </div>

            <div class="option-group">
                <label>Color</label>
                <div class="color-options" id="color-options"></div>
            </div>

        </div>

        <div class="quantity-selector">

            <label>Cantidad</label>

            <div class="quantity-controls">
                <button class="qty-btn" onclick="decreaseQty()">−</button>

                <input
                    type="number"
                    id="quantity"
                    value="1"
                    min="1">

                <button class="qty-btn" onclick="increaseQty()">+</button>
            </div>

        </div>

        <div class="product-actions">

            <button
                class="btn btn-primary btn-large"
                onclick="addToCartFromDetail()">

                Agregar al carrito

            </button>

        </div>

    </div>

</main>

    <!-- Overlay -->
    <div
        class="sidebar-overlay"
        id="sidebar-overlay"
        onclick="closeSidebars()">
    </div>

    <!-- Carrito -->
    <aside class="sidebar" id="cart-sidebar">

        <div class="sidebar-header">
            <h3>Tu Carrito</h3>

            <button class="close-btn" onclick="closeCart()">
                ✕
            </button>
        </div>

        <div class="sidebar-content" id="cart-items"></div>

    </aside>

    <!-- Wishlist -->
    <aside class="sidebar" id="wishlist-sidebar">

        <div class="sidebar-header">
            <h3>Lista de Deseos</h3>

            <button class="close-btn" onclick="closeWishlist()">
                ✕
            </button>
        </div>

        <div class="sidebar-content" id="wishlist-items"></div>

    </aside>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 SneakVault</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/producto.js"></script>

</body>
</html>
